<style>
    :root { --primary: #fb8c00; --bg: #f0f2f5; --card: #ffffff; --text: #111111; --border: #888888; }
    @media (prefers-color-scheme: dark) { :root { --bg: #000000; --card: #1c1c1e; --text: #ffffff; --border: #444444; } }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; }
    header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: 900; text-transform: uppercase; }
    .page { display: none; padding: 12px; width: 100%; max-width: 500px; margin: 0 auto; }
    .page.active { display: block; }
    .card { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
    .target-box { background: linear-gradient(135deg, #fb8c00, #f57c00); color: white; text-align: center; cursor: pointer; }
    input, select { width: 100%; height: 45px; padding: 0 10px; border: 2px solid var(--border); border-radius: 12px; background: var(--card); color: var(--text); font-size: 16px; -webkit-appearance: none; }
    .btn-add { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-box { background: rgba(251, 140, 0, 0.1); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid var(--primary); }
    .stat-box b { font-size: 1.1em; color: var(--primary); }
    .rank-item { padding: 10px; background: var(--card); border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border); }
    .rank-info { display: flex; justify-content: space-between; font-weight: 800; font-size: 0.82em; align-items: center; gap: 2px; }
    .progress-bg { background: #e0e0e0; height: 8px; border-radius: 4px; margin-top: 6px; overflow: hidden; }
    .progress-fill { background: var(--primary); height: 100%; transition: width 0.5s; }
    
    nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); display: flex; border-top: 1px solid var(--border); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
    nav div { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #888; font-size: 10px; flex-direction: column; }
    nav div.active { color: var(--primary); border-top: 4px solid var(--primary); }
    
    .btn-del { background: #ff3b30; color: white; border: none; padding: 5px 7px; border-radius: 6px; font-size: 10px; }
    .btn-edit { background: #007aff; color: white; border: none; padding: 5px 7px; border-radius: 6px; font-size: 10px; }
    
    .archive-recap { background: var(--primary); color: white; padding: 12px; border-radius: 15px; margin-bottom: 15px; font-size: 0.9em; text-align: center; line-height: 1.5; }

    /* Diario e Archivio: header fisso, lista scrolla */
    #home.active, #diario.active, #archivio.active {
        display: grid;
        grid-template-rows: auto 1fr;
        height: calc(100vh - 115px);
        overflow: hidden;
        padding: 0;
    }
    .page-fixed-top { padding: 12px 12px 0 12px; }
    .page-scroll-list { overflow-y: auto; padding: 0 12px 12px 12px; -webkit-overflow-scrolling: touch; }
</style>

            <b id="km-mancanti" style="font-size: 2em;">0</b> <small>KM AL TRAGUARDO</small>
            <div style="margin-top:8px; border-top:1px solid rgba(255,255,255,0.3); padding-top:8px; font-size:0.75em;">
                Target: <b id="val-target-tot">5000</b> | Proiezione: <b id="val-proiezione">0</b> | <b id="val-week">0</b> KM/SETT
            </div>
        </div>
        <div class="card"><div class="stats-grid"><div class="stat-box" style="grid-column: span 2;"><small>TOTALE KM STORICI</small><br><b id="st-km">0</b></div><div class="stat-box"><small>GIRI DEL MONDO</small><br><b id="st-world">0.00</b></div><div class="stat-box"><small>TOP MEDIA ANNO</small><br><b id="st-speed">0.00</b></div></div></div>
    </div>
    <div class="page-scroll-list">
        <div class="card">
            <h3 id="form-title" style="color:var(--primary); font-size: 0.8em; margin-bottom: 10px;">➕ AGGIUNGI ATTIVITÀ</h3>
            <input type="date" id="in-date" style="margin-bottom:10px;">
            <input type="number" step="0.01" id="in-dist" placeholder="KM" style="margin-bottom:10px;">
            <input type="text" id="in-time" placeholder="HH:MM:SS" style="margin-bottom:15px;">
            <button class="btn-add" id="btn-save" onclick="salvaManuale()">SALVA</button>
        </div>
        <div class="card" style="text-align:center;">
            <button onclick="esportaJSON()" style="background:#444; color:white; border:none; padding:10px; border-radius:10px; width:100%; font-weight:bold; font-size: 11px; margin-bottom: 5px;">📦 BACKUP JSON</button>
            <input type="file" id="json-input" accept=".json" style="display:none;">
            <button onclick="document.getElementById('json-input').click()" style="background:#888; color:white; border:none; padding:10px; border-radius:10px; width:100%; font-weight:bold; font-size: 11px; margin-bottom: 5px;">📥 IMPORTA JSON</button>
            <button onclick="pulisciTutto()" style="background:#ff3b30; color:white; border:none; padding:10px; border-radius:10px; width:100%; font-weight:bold; font-size: 11px;">🗑️ RESET DATI</button>
        </div>
    </div>
</div>

<div id="diario" class="page">
    <div class="page-fixed-top">
        <div class="card" style="text-align:center;"><h3 style="margin:0; font-size: 1em;">📖 DIARIO <span class="year-label"></span></h3></div>
        <div id="recap-diario"></div>
    </div>
    <div class="page-scroll-list"><div id="lista-diario"></div></div>
</div>

<div id="archivio" class="page">
    <div class="page-fixed-top">
        <div class="card" style="text-align:center;">
            <h3 style="margin:0; font-size: 1em; margin-bottom:10px;">📂 ARCHIVIO STORICO YTD</h3>
            <select id="sel-anno-archivio" onchange="disegnaArchivio()"></select>
        </div>
        <div id="recap-archivio"></div>
    </div>
    <div class="page-scroll-list"><div id="lista-archivio"></div></div>
</div>

<div id="ranking" class="page">
    <div class="card" style="text-align:center;">
        <h3 style="margin:0; font-size: 1em;">🏆 RANKING YTD</h3>
        <select id="metrica" onchange="disegnaClassifica()" style="margin-top:10px;">
            <option value="distanza">Distanza Totale (KM)</option>
            <option value="ponderata">Media Ponderata (KM Tot / Ore Tot)</option>
            <option value="media">Media Semplice (KM/H)</option>
        </select>
    </div>
    <div id="lista-ranking"></div>
</div>

<nav>
    <div id="nav-home" class="active" onclick="vaiA('home')">🏠<span>HOME</span></div>
    <div id="nav-diario" onclick="vaiA('diario')">📖<span>DIARIO</span></div>
    <div id="nav-archivio" onclick="vaiA('archivio')">📂<span>ARCHIVIO</span></div>
    <div id="nav-rank" onclick="vaiA('ranking')">🏆<span>RANK</span></div>
</nav>

<script>
    let rawData = [];
    const oggi = new Date();
    const currY = oggi.getFullYear();
    let myTarget = parseInt(localStorage.getItem('bainzuretta_target_' + currY)) || 5000;

    // Carica subito i dati così sono disponibili in qualsiasi momento
    const _s = localStorage.getItem('bainzuretta_raw');
    if (_s) { rawData = JSON.parse(_s); }
    
    const getDOY = (date) => {
        const start = new Date(date.getFullYear(), 0, 0);
        const diff = (date - start) + ((start.getTimezoneOffset() - date.getTimezoneOffset()) * 60 * 1000);
        return Math.floor(diff / (1000 * 60 * 60 * 24));
    };
    const doyOggi = getDOY(oggi);

    window.onload = () => {
        document.getElementById('main-header').innerText = "BAINZURETTA " + currY;
        document.querySelectorAll('.year-label').forEach(el => el.innerText = currY);
        const s = localStorage.getItem('bainzuretta_raw');
        if (s) { 
            rawData = JSON.parse(s); 
            aggiornaStats(); 
            popolaAnniArchivio();
            disegnaClassifica();
        }
        document.getElementById('val-target-tot').innerText = myTarget;
        document.getElementById('in-date').valueAsDate = oggi;
    };

    function formattaTempo(oreDec) {
        let totalSec = Math.round(oreDec * 3600);
        let h = Math.floor(totalSec / 3600);
        let m = Math.floor((totalSec % 3600) / 60);
        let s = totalSec % 60;
        return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function aggiornaStats() {
        let totK = 0, kY = 0;
        let pAnni = {};
        rawData.forEach(a => {
            let dist = parseFloat(a.distanza) || 0;
            let med = parseFloat(a.media) || 0;
            let y = new Date(a.data).getFullYear();
            totK += dist;
            if(y === currY) kY += dist;
            if(!pAnni[y]) pAnni[y] = { mSum: 0, count: 0 };
            if(med > 0) { pAnni[y].mSum += med; pAnni[y].count++; }
        });
        document.getElementById('st-km').innerText = totK.toLocaleString('it-IT', {minimumFractionDigits:2}) + " KM";
        document.getElementById('st-world').innerText = (totK / 40075).toFixed(2);
        
        let maxAvg = 0, bestY = "-";
        Object.keys(pAnni).forEach(y => {
            if(pAnni[y].count > 0) {
                let avg = pAnni[y].mSum / pAnni[y].count;
                if(avg > maxAvg) { maxAvg = avg; bestY = y; }
            }
        });
        document.getElementById('st-speed').innerHTML = maxAvg.toFixed(2) + ` <small>km/h (${bestY})</small>`;
        
        const mancanti = Math.max(0, myTarget - kY);
        document.getElementById('km-mancanti').innerText = mancanti.toLocaleString('it-IT');
        const giorniAnno = (currY % 4 === 0 && (currY % 100 !== 0 || currY % 400 === 0)) ? 366 : 365;
        document.getElementById('val-proiezione').innerText = Math.round((kY / Math.max(1, doyOggi)) * giorniAnno).toLocaleString('it-IT');
        const giorniRimanenti = Math.max(1, giorniAnno - doyOggi);
        document.getElementById('val-week').innerText = Math.ceil(mancanti / (giorniRimanenti / 7));
    }

    function popolaAnniArchivio() {
        const sel = document.getElementById('sel-anno-archivio');
        const anni = [...new Set(rawData.map(a => new Date(a.data).getFullYear()))].filter(y => y !== currY).sort((a,b) => b-a);
        if(anni.length > 0) {
            sel.innerHTML = anni.map(y => `<option value="${y}">${y}</option>`).join('');
            disegnaArchivio();
        } else {
            sel.innerHTML = "<option>Nessun dato</option>";
        }
    }

    function disegnaArchivio() {
        const annoScelto = parseInt(document.getElementById('sel-anno-archivio').value);
        if(isNaN(annoScelto)) return;
        const listaCont = document.getElementById('lista-archivio');
        const recapCont = document.getElementById('recap-archivio');
        listaCont.innerHTML = "";
        
        let filtrati = rawData.filter(a => {
            let d = new Date(a.data);
            return d.getFullYear() === annoScelto && getDOY(d) <= doyOggi;
        }).sort((a,b) => new Date(b.data) - new Date(a.data));

        let tKm = 0, tOre = 0, nAtt = filtrati.length;
        filtrati.forEach(a => {
            tKm += parseFloat(a.distanza);
            tOre += (parseFloat(a.distanza) / parseFloat(a.media));
            let riga = `<b>${parseFloat(a.distanza).toFixed(1)}</b>km | <b>${parseFloat(a.media).toFixed(1)}</b>km/h`;
            listaCont.innerHTML += `<div class="rank-item"><div class="rank-info"><span>${new Date(a.data).toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit'})}</span><span style="color:var(--primary);">${riga}</span></div></div>`;
        });

        let medPond = tOre > 0 ? (tKm / tOre).toFixed(2) : "0.00";
        recapCont.innerHTML = `
            <div class="archive-recap">
                Nel <b>${annoScelto}</b> (al giorno ${doyOggi}):<br>
                <b>${tKm.toFixed(1)} KM</b> in <b>${nAtt} attività</b><br>
                Media Ponderata: <b>${medPond} km/h</b>
            </div>`;
    }

    function disegnaClassifica() {
        const m = document.getElementById('metrica').value;
        const container = document.getElementById('lista-ranking');
        container.innerHTML = "";
        let p = {};
        rawData.forEach(a => {
            let dt = new Date(a.data);
            let y = dt.getFullYear();
            if(!p[y]) p[y] = { d:0, tSum:0, mSum:0, c:0 };
            if(getDOY(dt) <= doyOggi) {
                let dist = parseFloat(a.distanza) || 0;
                let med = parseFloat(a.media) || 0;
                p[y].d += dist;
                p[y].mSum += med;
                p[y].c++;
                p[y].tSum += (med > 0 ? dist / med : 0);
            }
        });
        let s = Object.keys(p).sort((a,b) => {
            if(m==='distanza') return p[b].d - p[a].d;
            if(m==='ponderata') return (p[b].d / (p[b].tSum || 1)) - (p[a].d / (p[a].tSum || 1));
            return (p[b].mSum / (p[b].c || 1)) - (p[a].mSum / (p[a].c || 1));
        });
        let maxVal = s.length ? Math.max(...s.map(y => {
            if(m==='distanza') return p[y].d;
            if(m==='ponderata') return (p[y].d / (p[y].tSum || 1));
            return (p[y].mSum / (p[y].c || 1));
        })) : 1;
        s.forEach((y, i) => {
            let val = m==='distanza' ? p[y].d : m==='ponderata' ? (p[y].d / (p[y].tSum || 1)) : (p[y].mSum / (p[y].c || 1));
            let unit = m==='distanza' ? " km" : " km/h";
            let isCurrentYear = parseInt(y) === currY;
            let linkStyle = !isCurrentYear ? 'cursor:pointer;' : '';
            let linkHint = !isCurrentYear ? ` onclick="apriArchivioAnno(${y})" title="Apri in Archivio"` : '';
            container.innerHTML += `<div class="rank-item" style="${linkStyle}"${linkHint}><div class="rank-info"><span>${i+1}. ${y}${!isCurrentYear ? ' <small style="color:#aaa;">↗</small>' : ''}</span><span style="color:var(--primary)">${val.toFixed(2)}${unit}</span></div><div class="progress-bg"><div class="progress-fill" style="width:${(val/maxVal)*100}%"></div></div></div>`;
        });
    }

    function salvaManuale() {
        const d = document.getElementById('in-date').value, k = parseFloat(document.getElementById('in-dist').value);
        if(!d || isNaN(k)) return;
        let tInput = document.getElementById('in-time').value;
        let tDec = 0;
        if(tInput.includes(':')) {
            let p = tInput.split(':');
            tDec = parseInt(p[0]) + (parseInt(p[1])/60) + (p[2]?parseInt(p[2])/3600:0);
        } else { tDec = parseFloat(tInput) || 0; }
        let med = tDec > 0 ? (k / tDec) : 0;
        rawData.push({ id: Date.now(), data: new Date(d).toISOString(), distanza: k, tempo: tDec, media: med });
        localStorage.setItem('bainzuretta_raw', JSON.stringify(rawData));
        location.reload();
    }

    function preparaModifica(id) {
        const a = rawData.find(x => x.id === id);
        if(!a) return;
        vaiA('home');
        document.getElementById('form-title').innerText = "✏️ MODIFICA ATTIVITÀ";
        document.getElementById('btn-save').innerText = "AGGIORNA";
        document.getElementById('in-date').value = a.data.split('T')[0];
        document.getElementById('in-dist').value = a.distanza;
        document.getElementById('in-time').value = formattaTempo(a.tempo);
        rawData = rawData.filter(x => x.id !== id);
    }

    function esportaJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(rawData));
        const a = document.createElement('a'); a.href = dataStr; a.download = "bainzuretta.json"; a.click();
    }

    document.getElementById('json-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            rawData = JSON.parse(new TextDecoder().decode(ev.target.result));
            localStorage.setItem('bainzuretta_raw', JSON.stringify(rawData));
            location.reload();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    };

    function vaiA(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav div').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-'+id).classList.add('active');
        if(id === 'ranking') disegnaClassifica();
        if(id === 'diario') disegnaDiario();
        if(id === 'archivio') disegnaArchivio();
    }

    function disegnaDiario() {
        const c = document.getElementById('lista-diario'); c.innerHTML = "";
        const lista = rawData.filter(a => new Date(a.data).getFullYear() === currY).sort((a,b) => new Date(b.data) - new Date(a.data));
        let tKmD = 0, tOreD = 0;
        lista.forEach(a => { tKmD += parseFloat(a.distanza); tOreD += (parseFloat(a.distanza) / parseFloat(a.media)); });
        let medPondD = tOreD > 0 ? (tKmD / tOreD).toFixed(2) : "0.00";
        document.getElementById('recap-diario').innerHTML = `<div class="archive-recap">Nel <b>${currY}</b> (al giorno ${doyOggi}):<br><b>${tKmD.toFixed(1)} KM</b> in <b>${lista.length} attività</b><br>Media Ponderata: <b>${medPondD} km/h</b></div>`;
        lista.forEach(a => {
            let rigaDati = `<b>${parseFloat(a.distanza).toFixed(1)}</b>km | <b>${formattaTempo(a.tempo)}</b> | <b>${parseFloat(a.media).toFixed(1)}</b>km/h`;
            c.innerHTML += `<div class="rank-item"><div class="rank-info"><span>${new Date(a.data).toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit'})}</span><span style="color:var(--primary);">${rigaDati}</span><div style="display:flex; gap:2px;"><button class="btn-edit" onclick="preparaModifica(${a.id})">✏️</button><button class="btn-del" onclick="eliminaAttivita(${a.id})">X</button></div></div></div>`;
        });
    }

    function apriArchivioAnno(anno) {
        const sel = document.getElementById('sel-anno-archivio');
        sel.value = anno;
        vaiA('archivio');
    }

    function eliminaAttivita(id) { if(confirm("Elimina?")) { rawData = rawData.filter(a => a.id !== id); localStorage.setItem('bainzuretta_raw', JSON.stringify(rawData)); location.reload(); } }
    function pulisciTutto() { if(confirm("CANCELLARE TUTTO?")) { localStorage.clear(); location.reload(); } }
    function cambiaObiettivo() { let n = prompt("Target per il " + currY + ":", myTarget); if(n) { myTarget = parseInt(n); localStorage.setItem('bainzuretta_target_' + currY, n); location.reload(); } }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
