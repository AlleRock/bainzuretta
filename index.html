<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bainzuretta V72</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fb8c00">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bainzuretta">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/AlleRock/bainzuretta/main/icona.png">
    
    <style>
        :root { --primary: #fb8c00; --bg: #f0f2f5; --card: #ffffff; --text: #111111; --border: #888888; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000000; --card: #1c1c1e; --text: #ffffff; --border: #444444; } }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 70px; user-select: none; }
        
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { text-align: center; font-size: 0.8rem; color: #888; text-decoration: none; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 2px; }

        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-del { background: #ff3b30; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; }
        
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 1rem; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-box { background: var(--bg); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--primary); display: block; }
        
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
        .rank-info { flex: 1; display: flex; justify-content: space-between; align-items: center; }
        
        .hidden { display: none; }
        .prog-bar { background: #eee; height: 10px; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .prog-fill { background: var(--primary); height: 100%; width: 0%; transition: width 0.3s; }
        
        #modal-edit { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; }
    </style>
</head>
<body>

    <header>
        <span id="header-title">Bainzuretta</span>
        <span id="header-year" onclick="cambiaObiettivo()" style="cursor:pointer; font-size: 0.9rem;"></span>
    </header>

    <div id="page-home" class="container">
        <div class="card">
            <h3>Progressi <span id="label-anno"></span></h3>
            <div class="stats-grid">
                <div class="stat-box">Distanza Tot.<span class="stat-val" id="stat-tot-km">0</span></div>
                <div class="stat-box">Media/Mese<span class="stat-val" id="stat-media-mese">0</span></div>
            </div>
            <div class="prog-bar"><div id="main-prog" class="prog-fill"></div></div>
            <p id="target-info" style="font-size: 0.8rem; margin-top: 5px; text-align: center; color: #888;"></p>
        </div>

        <div class="card">
            <h3>Aggiungi Attività</h3>
            <input type="date" id="add-data">
            <div style="display: flex; gap: 10px;">
                <input type="number" id="add-km" placeholder="Km" step="0.1" inputmode="decimal">
                <input type="number" id="add-min" placeholder="Minuti" inputmode="numeric">
            </div>
            <button class="btn" onclick="salvaAttivita()">SALVA</button>
        </div>
        
        <div class="card">
            <h3>Ultimi 5 Allenamenti</h3>
            <div id="last-5-list"></div>
        </div>
    </div>

    <div id="page-diario" class="container hidden">
        <div class="card">
            <h3 id="diario-title">Storico Attività</h3>
            <div id="diario-list"></div>
        </div>
    </div>

    <div id="page-archivio" class="container hidden">
        <div class="card">
            <h3>Archivio Anni</h3>
            <select id="sel-anno-archivio" onchange="cambiaAnnoArchivio()"></select>
            <div id="archivio-stats" class="stats-grid" style="margin-top: 15px;"></div>
            <div id="archivio-list" style="margin-top: 15px;"></div>
        </div>
    </div>

    <div id="page-records" class="container hidden">
        <div class="card">
            <h3>Personal Best & Records</h3>
            <div id="lista-records"></div>
        </div>
    </div>

    <div id="modal-edit" class="hidden">
        <div class="modal-content">
            <h3>Modifica</h3>
            <input type="date" id="edit-data">
            <input type="number" id="edit-km" placeholder="Km" step="0.1">
            <input type="number" id="edit-min" placeholder="Minuti">
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn btn-outline" onclick="chiudiEdit()">Annulla</button>
                <button class="btn" onclick="confermaEdit()">Salva</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="vaiA('home')"><i>🏠</i>Home</div>
        <div class="nav-item" onclick="vaiA('diario')"><i>📅</i>Diario</div>
        <div class="nav-item" onclick="vaiA('archivio')"><i>📁</i>Archivio</div>
        <div class="nav-item" onclick="vaiA('records')"><i>🏆</i>Records</div>
    </nav>

    <script>
    let rawData = JSON.parse(localStorage.getItem('bainzuretta_raw')) || [];
    let currY = new Date().getFullYear();
    let myTarget = parseInt(localStorage.getItem('bainzuretta_target_' + currY)) || 2000;
    let editId = null;

    window.onload = () => {
        document.getElementById('add-data').valueAsDate = new Date();
        aggiornaStats();
        popolaAnniArchivio();
    };

    function vaiA(p) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + p).classList.remove('hidden');
        const items = document.querySelectorAll('.nav-item');
        if(p==='home') items[0].classList.add('active');
        if(p==='diario') { items[1].classList.add('active'); disegnaDiario(); }
        if(p==='archivio') items[2].classList.add('active');
        if(p==='records') { items[3].classList.add('active'); disegnaRecords(); }
        window.scrollTo(0,0);
    }

    function salvaAttivita() {
        const d = document.getElementById('add-data').value;
        const k = parseFloat(document.getElementById('add-km').value);
        const m = parseInt(document.getElementById('add-min').value);
        if(!d || !k) return alert('Dati mancanti');
        const nuovo = { id: Date.now(), data: d, km: k, min: m || 0 };
        rawData.push(nuovo);
        localStorage.setItem('bainzuretta_raw', JSON.stringify(rawData));
        document.getElementById('add-km').value = '';
        document.getElementById('add-min').value = '';
        aggiornaStats();
    }

    function aggiornaStats() {
        const annoDati = rawData.filter(a => new Date(a.data).getFullYear() === currY);
        const tot = annoDati.reduce((s, a) => s + a.km, 0);
        document.getElementById('stat-tot-km').innerText = tot.toFixed(1);
        document.getElementById('label-anno').innerText = currY;
        document.getElementById('header-year').innerText = 'Target: ' + myTarget + ' km';
        
        const mesiPassati = (new Date().getMonth() + 1);
        document.getElementById('stat-media-mese').innerText = (tot / mesiPassati).toFixed(1);
        
        const perc = Math.min((tot / myTarget) * 100, 100);
        document.getElementById('main-prog').style.width = perc + '%';
        document.getElementById('target-info').innerText = `Mancano ${(myTarget - tot).toFixed(1)} km al traguardo`;

        const last5 = [...rawData].sort((a,b) => new Date(b.data) - new Date(a.data)).slice(0,5);
        let h = '';
        last5.forEach(a => {
            h += `<div class="rank-item"><span>${new Date(a.data).toLocaleDateString()}</span><b>${a.km} km</b></div>`;
        });
        document.getElementById('last-5-list').innerHTML = h || '<p>Nessuna attività</p>';
    }

    function disegnaDiario() {
        const annoDati = rawData.filter(a => new Date(a.data).getFullYear() === currY)
                                 .sort((a,b) => new Date(b.data) - new Date(a.data));
        const cont = document.getElementById('diario-list');
        cont.innerHTML = '';
        if(!annoDati.length) { cont.innerHTML = 'Nessun dato'; return; }
        
        annoDati.forEach(a => {
            cont.innerHTML += `<div class="rank-item">
                <div class="rank-info" onclick="apriEdit(${a.id})">
                    <span>${new Date(a.data).toLocaleDateString()}</span>
                    <span><b>${a.km} km</b> in ${a.min}'</span>
                </div>
                <button class="btn-del" onclick="eliminaAttivita(${a.id})">X</button>
            </div>`;
        });
    }

    function disegnaRecords() {
        if (!rawData.length) {
            document.getElementById('lista-records').innerHTML = "Nessun dato presente.";
            return;
        }

        // 1. Record Distanza, Durata, Velocità
        let maxDist = { km: 0, data: '' };
        let maxDurata = { min: 0, data: '' };
        let maxVel = { vel: 0, data: '' };

        rawData.forEach(a => {
            if (a.km > maxDist.km) maxDist = a;
            if (a.min > maxDurata.min) maxDurata = a;
            let v = a.min > 0 ? (a.km / (a.min / 60)) : 0;
            if (v > maxVel.vel) maxVel = { vel: v, data: a.data };
        });

        // 2. Calcolo Striscia di settimane consecutive
        let settimaneAssolute = rawData.map(a => {
            let d = new Date(a.data);
            let firstJan = new Date(d.getFullYear(), 0, 1);
            let week = Math.ceil((((d - firstJan) / 86400000) + firstJan.getDay() + 1) / 7);
            return (d.getFullYear() * 100) + week;
        });
        settimaneAssolute = [...new Set(settimaneAssolute)].sort((a, b) => a - b);

        let maxStriscia = 0, strisciaAttuale = 1;
        for (let i = 1; i < settimaneAssolute.length; i++) {
            // Calcolo semplice: se la differenza è 1 (stesso anno) o gestisce salto anno (es. 202352 -> 202401)
            let diff = settimaneAssolute[i] - settimaneAssolute[i - 1];
            if (diff === 1 || diff === 49) { // 49 è approssimativo per salto anno 52->01
                strisciaAttuale++;
            } else {
                if (strisciaAttuale > maxStriscia) maxStriscia = strisciaAttuale;
                strisciaAttuale = 1;
            }
        }
        if (strisciaAttuale > maxStriscia) maxStriscia = strisciaAttuale;

        const fmt = (d) => d ? new Date(d).toLocaleDateString('it-IT') : '-';

        document.getElementById('lista-records').innerHTML = `
            <div class="card" style="background:rgba(251,140,0,0.1)">
                <b>Record Distanza:</b><br>${maxDist.km} km il ${fmt(maxDist.data)}
            </div>
            <div class="card">
                <b>Più tempo in sella:</b><br>${maxDurata.min} min il ${fmt(maxDurata.data)}
            </div>
            <div class="card">
                <b>Record Velocità Media:</b><br>${maxVel.vel.toFixed(1)} km/h il ${fmt(maxVel.data)}
            </div>
            <div class="card">
                <b>Costanza (Settimane consecutive):</b><br>${maxStriscia} settimane
            </div>
        `;
    }

    function popolaAnniArchivio() {
        const anni = [...new Set(rawData.map(a => new Date(a.data).getFullYear()))].sort((a,b) => b-a);
        const sel = document.getElementById('sel-anno-archivio');
        sel.innerHTML = '<option value="">Scegli...</option>';
        anni.forEach(y => sel.innerHTML += `<option value="${y}">${y}</option>`);
    }

    function cambiaAnnoArchivio() {
        const y = parseInt(document.getElementById('sel-anno-archivio').value);
        if(!y) return;
        const dati = rawData.filter(a => new Date(a.data).getFullYear() === y).sort((a,b) => new Date(b.data) - new Date(a.data));
        const tot = dati.reduce((s,a) => s+a.km, 0);
        
        document.getElementById('archivio-stats').innerHTML = `
            <div class="stat-box">Totale ${y}<span class="stat-val">${tot.toFixed(1)}</span></div>
            <div class="stat-box">Uscite<span class="stat-val">${dati.length}</span></div>
        `;
        
        let h = '';
        dati.forEach(a => {
            h += `<div class="rank-item"><span>${new Date(a.data).toLocaleDateString()}</span><b>${a.km} km</b></div>`;
        });
        document.getElementById('archivio-list').innerHTML = h;
    }

    function apriEdit(id) {
        editId = id;
        const a = rawData.find(x => x.id === id);
        document.getElementById('edit-data').value = a.data;
        document.getElementById('edit-km').value = a.km;
        document.getElementById('edit-min').value = a.min;
        document.getElementById('modal-edit').classList.remove('hidden');
    }

    function chiudiEdit() { document.getElementById('modal-edit').classList.add('hidden'); }

    function confermaEdit() {
        const a = rawData.find(x => x.id === editId);
        a.data = document.getElementById('edit-data').value;
        a.km = parseFloat(document.getElementById('edit-km').value);
        a.min = parseInt(document.getElementById('edit-min').value);
        localStorage.setItem('bainzuretta_raw', JSON.stringify(rawData));
        chiudiEdit();
        aggiornaStats();
        disegnaDiario();
    }

    function eliminaAttivita(id) {
        if(confirm('Elimina questa attività?')) {
            rawData = rawData.filter(a => a.id !== id);
            localStorage.setItem('bainzuretta_raw', JSON.stringify(rawData));
            aggiornaStats();
            disegnaDiario();
        }
    }

    function cambiaObiettivo() {
        let n = prompt('Imposta nuovo target km per il ' + currY + ':', myTarget);
        if(n) {
            myTarget = parseInt(n);
            localStorage.setItem('bainzuretta_target_' + currY, n);
            aggiornaStats();
        }
    }
    </script>
</body>
</html>
